# Tier 2 dev stack: Iceberg REST catalog (Apache Polaris) + S3-compatible
# object store (SeaweedFS). Brought up by `make dev-up`, torn down by
# `make dev-down`. warzone itself runs on the host via `make run-stack`
# against dev/stack.yaml — it is NOT containerized here.
name: warzone-dev

services:
  seaweedfs:
    image: chrislusf/seaweedfs:4.39
    # -s3.domainName lets SeaweedFS also accept virtual-hosted-style requests
    # (<bucket>.seaweedfs) — Polaris's server-side AWS SDK uses vhost style for
    # its location-validation writes. warzone's own client stays path-style.
    command: >
      server -dir=/data -s3 -s3.port=8333 -s3.domainName=seaweedfs
      -s3.config=/etc/seaweed/s3.json -ip.bind=0.0.0.0
    ports:
      - "8333:8333" # S3 API
    volumes:
      - ./seaweed-s3.json:/etc/seaweed/s3.json:ro
    networks:
      default:
        # so <bucket>.seaweedfs (vhost style) resolves inside the network.
        aliases:
          - warehouse.seaweedfs
    healthcheck:
      # busybox nc: succeeds once the S3 port accepts connections.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8333 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  polaris:
    image: apache/polaris:1.4.1
    depends_on:
      seaweedfs:
        condition: service_healthy
    ports:
      - "8181:8181" # Iceberg REST + management API
      - "8182:8182" # health/metrics
    environment:
      # realm,clientId,clientSecret — matches dev/stack.yaml `credential`.
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      polaris.realm-context.realms: "POLARIS"
      # In-memory metastore: catalog config is recreated by init.sh each up.
      polaris.persistence.type: "in-memory"
      # SeaweedFS has no AWS STS, so Polaris can't vend subscoped credentials.
      # Skip subscoping — the client (warzone) uses its own static S3 creds.
      polaris.features."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION": "true"
      # Static S3 creds + http endpoint so Polaris's own AWS SDK (location
      # validation on table create) talks to SeaweedFS, not real AWS.
      AWS_ACCESS_KEY_ID: "warzone"
      AWS_SECRET_ACCESS_KEY: "warzone"
      AWS_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://seaweedfs:8333"
      AWS_ENDPOINT_URL_S3: "http://seaweedfs:8333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  init:
    image: alpine:3.20
    depends_on:
      seaweedfs:
        condition: service_healthy
      polaris:
        condition: service_healthy
    volumes:
      - ./init.sh:/init.sh:ro
    # aws-cli for the bucket, curl+jq for the Polaris REST calls.
    entrypoint:
      ["/bin/sh", "-c", "apk add --no-cache aws-cli curl jq >/dev/null && sh /init.sh"]
    environment:
      AWS_ACCESS_KEY_ID: "warzone"
      AWS_SECRET_ACCESS_KEY: "warzone"
      AWS_DEFAULT_REGION: "us-east-1"
    restart: "no"
